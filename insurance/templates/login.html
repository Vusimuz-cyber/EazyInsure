{% extends 'base.html' %}
{% load static %}
{% block content %}
    <section style="padding: 4rem; text-align: center;">
        <div style="background: rgba(135, 206, 235, 0.8); padding: 2rem; max-width: 400px; margin: 0 auto; border-radius: 10px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);">
            <h1 style="font-size: 2rem; color: white; margin-bottom: 1.5rem;">Login to EazyInsure</h1>
            {% if messages %}
                {% for message in messages %}
                    <p style="color: red; margin-bottom: 1.5rem; font-size: 1.1rem;">{{ message }}</p>
                {% endfor %}
            {% endif %}
            <form method="post" style="display: flex; flex-direction: column; gap: 1rem;">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username" style="padding: 1rem; font-size: 1.1rem; border: none; border-radius: 5px;" required>
                <input type="password" name="password" placeholder="Password" style="padding: 1rem; font-size: 1.1rem; border: none; border-radius: 5px;" required>
                <button type="submit" style="padding: 1rem; font-size: 1.1rem; background: #1e3a8a; color: white; border: none; border-radius: 5px; cursor: pointer; transition: transform 0.2s;">Login</button>
            </form>
            <p style="color: white; margin-top: 1rem;">Don't have an account? <a href="{% url 'register' %}" style="color: #1e3a8a; text-decoration: underline;">Register here</a>.</p>
        </div>
    </section>
{% endblock %}
