{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="pg-sm">
    <div style="text-align:center; margin-bottom: 2.5rem;" class="anim">
        <div style="display:inline-flex; align-items:center; gap:10px; margin-bottom:1.5rem;">
            <div class="nav-logo-mark" style="width:42px; height:42px; font-size:1.2rem;">⚡</div>
            <span style="font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:600; color:var(--txt); letter-spacing:0.01em;">EazyInsure</span>
        </div>
        <p class="t-hero" style="font-size:clamp(1.8rem,4vw,2.5rem);">Welcome <span>back.</span></p>
        <p class="t-sub">Sign in to manage your insurance</p>
    </div>

    <div class="form-wrap anim-1">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-err">⚠ {{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="fg">
                <label class="flbl">Username</label>
                <input type="text" name="username" placeholder="Enter your username" required autocomplete="username">
            </div>
            <div class="fg">
                <label class="flbl">Password</label>
                <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>
            <div style="height:0.5rem;"></div>
            <button type="submit" class="btn btn-gold btn-full">Sign In</button>
        </form>

        <p style="text-align:center; margin-top:1.75rem; font-size:0.88rem; color:var(--txt-2);">
            Don't have an account?
            <a href="{% url 'register' %}" style="color:var(--gold-l); text-decoration:none; font-weight:600; margin-left:0.3rem;">Register here →</a>
        </p>
    </div>
</div>
{% endblock %}
