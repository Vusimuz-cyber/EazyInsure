{% extends 'base.html' %}
{% load static %}
{% block content %}
    <section style="padding: 4rem; text-align: center;">
        <h1 style="font-size: 2.5rem; color: white; margin-bottom: 2rem; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);">Get a Quote</h1>
        {% if messages %}
            {% for message in messages %}
                <p style="color: {% if message.tags == 'success' %}#32CD32{% else %}#FF6F61{% endif %}; margin-bottom: 1.5rem; font-size: 1.1rem; background: rgba(255, 255, 255, 0.5); padding: 0.5rem; border-radius: 5px;">{{ message }}</p>
            {% endfor %}
        {% endif %}
        <form method="post" style="display: flex; flex-direction: column; gap: 1.5rem; max-width: 600px; margin: 0 auto; background: rgba(138, 74, 243, 0.8); padding: 2rem; border-radius: 15px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3); transform: translateZ(20px);">
            {% csrf_token %}
            <input type="text" name="car_make" placeholder="Car Make (e.g., Toyota)" style="padding: 1rem; font-size: 1.1rem; border: none; border-radius: 8px; background: rgba(255, 255, 255, 0.7); box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);" required>
            <input type="text" name="car_model" placeholder="Car Model (e.g., Hilux)" style="padding: 1rem; font-size: 1.1rem; border: none; border-radius: 8px; background: rgba(255, 255, 255, 0.7); box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);" required>
            <input type="number" name="car_year" placeholder="Car Year (e.g., 2015)" style="padding: 1rem; font-size: 1.1rem; border: none; border-radius: 8px; background: rgba(255, 255, 255, 0.7); box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);" required>
            <textarea name="address" placeholder="Your Address (e.g., 123 Main St, Johannesburg CBD)" style="padding: 1rem; font-size: 1.1rem; border: none; border-radius: 8px; background: rgba(255, 255, 255, 0.7); box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1); min-height: 100px;" required></textarea>
            <label style="color: white; font-size: 1.1rem;"><input type="checkbox" name="has_tracking_device"> Has Tracking Device</label>
            <label style="color: white; font-size: 1.1rem;"><input type="checkbox" name="has_alarm"> Has Alarm</label>
            <select name="parking_type" style="padding: 1rem; font-size: 1.1rem; border: none; border-radius: 8px; background: rgba(255, 255, 255, 0.7); box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);" required>
                <option value="garage">Garage</option>
                <option value="street">Street</option>
                <option value="secure_lot">Secure Lot</option>
            </select>
            <button type="submit" style="padding: 1rem; font-size: 1.2rem; background: #FF6F61; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); transition: transform 0.3s, box-shadow 0.3s;">Get Quote</button>
        </form>
    </section>
{% endblock %}
